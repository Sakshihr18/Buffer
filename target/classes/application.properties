# Server Configuration
server.port=8080

# Database Configuration - Using H2 for testing
spring.datasource.url=jdbc:h2:mem:supply_chain_db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3001

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.supplychain=DEBUG
logging.level.org.hibernate.SQL=DEBUG